<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shift Reporter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e8eaf0; min-height: 100vh; padding: 16px; }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #6b7280; margin-bottom: 24px; }
    .card { background: #161b27; border: 1px solid #2a2f3e; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .section-title { font-size: 11px; font-weight: 500; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
    .field { margin-bottom: 14px; }
    label { font-size: 12px; color: #6b7280; margin-bottom: 5px; display: block; }
    input, select, textarea { width: 100%; background: #0f1117; border: 1px solid #2a2f3e; border-radius: 8px; color: #e8eaf0; font-size: 15px; padding: 10px 12px; font-family: 'Segoe UI', sans-serif; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; }
    textarea { resize: none; }
    .toggle-row { display: flex; gap: 8px; }
    .toggle-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #2a2f3e; background: #0f1117; color: #6b7280; font-size: 14px; cursor: pointer; text-align: center; transition: all 0.15s; }
    .toggle-btn.active-yes { background: #142d1f; border-color: #14532d; color: #4ade80; }
    .toggle-btn.active-no { background: #2d1515; border-color: #7f1d1d; color: #f87171; }
    .conditional { display: none; margin-top: 10px; }
    .conditional.visible { display: block; }
    .train-card { background: #0f1117; border: 1px solid #2a2f3e; border-radius: 10px; padding: 16px; margin-bottom: 12px; position: relative; }
    .train-number { font-size: 12px; color: #3b82f6; margin-bottom: 12px; font-weight: 500; }
    .remove-train { position: absolute; top: 12px; right: 12px; background: transparent; border: none; color: #6b7280; cursor: pointer; font-size: 18px; line-height: 1; }
    .add-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px dashed #2a2f3e; background: transparent; color: #6b7280; font-size: 14px; cursor: pointer; margin-bottom: 8px; }
    .add-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .submit-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #1d4ed8; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 8px; font-family: 'Segoe UI', sans-serif; }
    .submit-btn:hover { background: #1e40af; }
    .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .mode-btn { padding: 14px; border-radius: 10px; border: 1px solid #2a2f3e; background: #161b27; color: #9ca3af; font-size: 14px; cursor: pointer; text-align: center; }
    .mode-btn.active { background: #1a2744; border-color: #1d4ed8; color: #60a5fa; }
    .output-box { background: #0f1117; border: 1px solid #2a2f3e; border-radius: 10px; padding: 16px; font-size: 13px; line-height: 1.8; color: #e8eaf0; white-space: pre-wrap; word-break: break-word; margin-bottom: 12px; }
    .copy-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #059669; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; font-family: 'Segoe UI', sans-serif; }
    .copy-btn:hover { background: #047857; }
    .back-btn { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #2a2f3e; background: transparent; color: #9ca3af; font-size: 14px; cursor: pointer; margin-top: 10px; font-family: 'Segoe UI', sans-serif; }
    .checklist { display: flex; flex-direction: column; gap: 8px; }
    .check-item { display: flex; align-items: center; gap: 10px; background: #0f1117; border: 1px solid #2a2f3e; border-radius: 8px; padding: 10px 12px; cursor: pointer; }
    .check-item.checked { background: #142d1f; border-color: #14532d; }
    .check-item span { font-size: 14px; color: #e8eaf0; flex: 1; }
    .check-icon { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #2a2f3e; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .check-item.checked .check-icon { background: #14532d; border-color: #4ade80; color: #4ade80; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cleaning-types { display: flex; flex-direction: column; gap: 6px; }
    .type-btn { padding: 8px 12px; border-radius: 6px; border: 1px solid #2a2f3e; background: #0f1117; color: #6b7280; font-size: 13px; cursor: pointer; text-align: left; }
    .type-btn.active { background: #1a2744; border-color: #1d4ed8; color: #60a5fa; }
    .phc-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .phc-btn { padding: 8px; border-radius: 6px; border: 1px solid #2a2f3e; background: #0f1117; color: #6b7280; font-size: 13px; cursor: pointer; text-align: center; }
    .phc-btn.active { background: #1a2744; border-color: #1d4ed8; color: #60a5fa; }
  </style>
</head>
<body>
<div class="container">
  <h1>Shift Reporter</h1>
  <p class="subtitle">Churchill Cleaning · Hitachi Depot Edinburgh</p>

  <div id="mode-select">
    <div class="mode-selector">
      <div class="mode-btn" onclick="setMode('sos')">Start of Shift</div>
      <div class="mode-btn" onclick="setMode('eos')">End of Shift</div>
    </div>
  </div>

  <div id="sos-form" style="display:none"></div>
  <div id="eos-form" style="display:none"></div>
  <div id="output" style="display:none"></div>
</div>
<script>
  const STAFF = ['John', 'Ben', 'Mariusz', 'Renata'] // will be replaced with live data later
  const TRAIN_TYPES = ['Azuma', 'Lumo', 'TP', 'Voyager']
  const CLEANING_TYPES = ['PHC', 'Daily', 'Other']
  let currentMode = ''
  let sosTrains = []
  let eosTrains = []

  function setMode(mode) {
    currentMode = mode
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'))
    event.target.classList.add('active')
    document.getElementById('sos-form').style.display = mode === 'sos' ? 'block' : 'none'
    document.getElementById('eos-form').style.display = mode === 'eos' ? 'block' : 'none'
    document.getElementById('output').style.display = 'none'
    if (mode === 'sos') renderSOS()
    if (mode === 'eos') renderEOS()
  }

  function toggle(id, isYes, conditionalId) {
    const btns = document.querySelectorAll(`[data-group="${id}"]`)
    btns.forEach(b => { b.classList.remove('active-yes', 'active-no') })
    event.target.classList.add(isYes ? 'active-yes' : 'active-no')
    if (conditionalId) {
      document.getElementById(conditionalId).classList.toggle('visible', !isYes)
    }
  }

  function getToggle(id) {
    const active = document.querySelector(`[data-group="${id}"].active-yes, [data-group="${id}"].active-no`)
    if (!active) return null
    return active.classList.contains('active-yes') ? 'Yes' : 'No'
  }

  function toggleCheck(el) {
    el.classList.toggle('checked')
  }

  function getChecked(containerId) {
    return Array.from(document.querySelectorAll(`#${containerId} .check-item.checked span`)).map(s => s.textContent)
  }

  function addSOSTrain() {
    sosTrains.push({ type: 'Azuma', id: '', cleaning: 'PHC', internal: false, external: false, eta: '', required: '', departure: '' })
    renderSOS()
  }

  function removeSOSTrain(i) {
    sosTrains.splice(i, 1)
    renderSOS()
  }

  function addEOSTrain() {
    eosTrains.push({ type: 'Azuma', id: '', cleaning: 'PHC', internal: false, external: false, start: '', end: '', earlyLeave: '' })
    renderEOS()
  }

  function removeEOSTrain(i) {
    eosTrains.splice(i, 1)
    renderEOS()
  }

  function saveSOSTrain(i) {
    sosTrains[i] = {
      type: document.getElementById(`sos-train-type-${i}`).value,
      id: document.getElementById(`sos-train-id-${i}`).value,
      cleaning: document.querySelector(`[data-sos-cleaning="${i}"].active`)?.dataset.val || 'PHC',
      internal: document.getElementById(`sos-internal-${i}`)?.classList.contains('active') || false,
      external: document.getElementById(`sos-external-${i}`)?.classList.contains('active') || false,
      eta: document.getElementById(`sos-eta-${i}`).value,
      required: document.getElementById(`sos-required-${i}`).value,
      departure: document.getElementById(`sos-departure-${i}`).value,
    }
  }

  function saveEOSTrain(i) {
    eosTrains[i] = {
      type: document.getElementById(`eos-train-type-${i}`).value,
      id: document.getElementById(`eos-train-id-${i}`).value,
      cleaning: document.querySelector(`[data-eos-cleaning="${i}"].active`)?.dataset.val || 'PHC',
      internal: document.getElementById(`eos-internal-${i}`)?.classList.contains('active') || false,
      external: document.getElementById(`eos-external-${i}`)?.classList.contains('active') || false,
      start: document.getElementById(`eos-start-${i}`).value,
      end: document.getElementById(`eos-end-${i}`).value,
      earlyLeave: document.getElementById(`eos-early-${i}`).value,
    }
  }

  function trainTypeOptions(selected) {
    return TRAIN_TYPES.map(t => `<option ${t === selected ? 'selected' : ''}>${t}</option>`).join('')
  }

  function cleaningTypeBtns(prefix, i, selected) {
    return CLEANING_TYPES.map(t => `
      <button class="type-btn ${t === selected ? 'active' : ''}" data-${prefix}-cleaning="${i}" data-val="${t}"
        onclick="this.closest('.train-card').querySelectorAll('[data-${prefix}-cleaning]').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('${prefix}-phc-${i}').style.display=this.dataset.val==='PHC'?'grid':'none'">
        ${t}
      </button>`).join('')
  }

  function staffChecklist(containerId) {
    return `<div class="checklist" id="${containerId}">
      ${STAFF.map(s => `<div class="check-item" onclick="toggleCheck(this)">
        <div class="check-icon">✓</div>
        <span>${s}</span>
      </div>`).join('')}
    </div>`
  }

  function renderSOS() {
    const today = new Date().toISOString().split('T')[0]
    document.getElementById('sos-form').innerHTML = `
      <div class="card">
        <div class="section-title">Shift Info</div>
        <div class="field"><label>Date</label><input type="date" id="sos-date" value="${today}" /></div>
        <div class="field"><label>Shift</label>
          <select id="sos-shift"><option>Night</option><option>Day</option></select>
        </div>
        <div class="field"><label>Depot Manager on shift</label><input type="text" id="sos-dm" placeholder="Full name" /></div>
        <div class="field"><label>Supervisor on shift</label><input type="text" id="sos-supervisor" placeholder="Full name" /></div>
      </div>

      <div class="card">
        <div class="section-title">Staff</div>
        <div class="field"><label>Headcount</label><input type="number" id="sos-headcount" placeholder="0" /></div>
        <div class="field"><label>Names of staff on shift</label>${staffChecklist('sos-staff')}</div>
      </div>

      <div class="card">
        <div class="section-title">Checks</div>
        ${yesNoField('sos-planner', 'Picture of planner sent', null)}
        ${yesNoField('sos-ontime', 'All staff on time', 'sos-late-box')}
        <div class="conditional" id="sos-late-box">
          <div class="field"><label>Who was late</label><input type="text" id="sos-late" placeholder="Names..." /></div>
        </div>
        ${yesNoField('sos-fire', 'All staff signed in on Fire register / Reception', null)}
        ${yesNoField('sos-tracker', 'Churchill shift tracker signed', null)}
        ${yesNoField('sos-ppe', 'All staff in full PPE & inspected', null)}
        ${yesNoField('sos-storage', 'Storage unit & equipment in good order', null)}
      </div>

      <div class="card">
        <div class="section-title">Trains Assigned</div>
        <div id="sos-trains">
          ${sosTrains.map((t, i) => sosTrainCard(t, i)).join('')}
        </div>
        <button class="add-btn" onclick="saveAllSOS();addSOSTrain()">+ Add Train</button>
      </div>

      <button class="submit-btn" onclick="saveAllSOS();generateSOS()">Generate Report</button>
    `
  }

  function renderEOS() {
    const today = new Date().toISOString().split('T')[0]
    document.getElementById('eos-form').innerHTML = `
      <div class="card">
        <div class="section-title">Shift Info</div>
        <div class="field"><label>Date</label><input type="date" id="eos-date" value="${today}" /></div>
        <div class="field"><label>Shift</label>
          <select id="eos-shift"><option>Night</option><option>Day</option></select>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Trains Cleaned</div>
        <div id="eos-trains">
          ${eosTrains.map((t, i) => eosTrainCard(t, i)).join('')}
        </div>
        <button class="add-btn" onclick="saveAllEOS();addEOSTrain()">+ Add Train</button>
      </div>

      <div class="card">
        <div class="section-title">End of Shift Checks</div>
        ${yesNoField('eos-hitachi', 'Hitachi presentation check', null)}
        ${yesNoField('eos-docs', 'Documents signed', null)}
        <div class="field"><label>End of shift time</label><input type="time" id="eos-endtime" /></div>
        <div class="field"><label>Additional notes</label><textarea id="eos-notes" rows="3" placeholder="Challenges, equipment, morale..."></textarea></div>
      </div>

      <button class="submit-btn" onclick="saveAllEOS();generateEOS()">Generate Report</button>
    `
  }

  function yesNoField(id, labelText, conditionalId) {
    return `<div class="field">
      <label>${labelText}</label>
      <div class="toggle-row">
        <div class="toggle-btn" data-group="${id}" onclick="toggle('${id}', true, '${conditionalId}')">Yes</div>
        <div class="toggle-btn" data-group="${id}" onclick="toggle('${id}', false, '${conditionalId}')">No</div>
      </div>
      ${conditionalId ? `<div class="conditional" id="${conditionalId}"></div>` : ''}
    </div>`
  }

  function sosTrainCard(t, i) {
    return `<div class="train-card">
      <div class="train-number">Train ${i + 1}</div>
      <button class="remove-train" onclick="saveAllSOS();removeSOSTrain(${i})">×</button>
      <div class="grid2">
        <div class="field"><label>Type</label>
          <select id="sos-train-type-${i}">${trainTypeOptions(t.type)}</select>
        </div>
        <div class="field"><label>Train ID</label>
          <input type="text" id="sos-train-id-${i}" value="${t.id}" placeholder="e.g. 801202" />
        </div>
      </div>
      <div class="field"><label>Cleaning Type</label>
        <div class="cleaning-types">${cleaningTypeBtns('sos', i, t.cleaning)}</div>
        <div class="phc-options" id="sos-phc-${i}" style="display:${t.cleaning === 'PHC' ? 'grid' : 'none'}">
          <button class="phc-btn ${t.internal ? 'active' : ''}" id="sos-internal-${i}" onclick="this.classList.toggle('active')">Internal</button>
          <button class="phc-btn ${t.external ? 'active' : ''}" id="sos-external-${i}" onclick="this.classList.toggle('active')">External</button>
        </div>
      </div>
      <div class="grid2">
        <div class="field"><label>ETA</label><input type="time" id="sos-eta-${i}" value="${t.eta}" /></div>
        <div class="field"><label>Required back</label><input type="time" id="sos-required-${i}" value="${t.required}" /></div>
      </div>
      <div class="field"><label>Departure</label><input type="time" id="sos-departure-${i}" value="${t.departure}" /></div>
    </div>`
  }

  function eosTrainCard(t, i) {
    return `<div class="train-card">
      <div class="train-number">Train ${i + 1}</div>
      <button class="remove-train" onclick="saveAllEOS();removeEOSTrain(${i})">×</button>
      <div class="grid2">
        <div class="field"><label>Type</label>
          <select id="eos-train-type-${i}">${trainTypeOptions(t.type)}</select>
        </div>
        <div class="field"><label>Train ID</label>
          <input type="text" id="eos-train-id-${i}" value="${t.id}" placeholder="e.g. 801202" />
        </div>
      </div>
      <div class="field"><label>Cleaning Type</label>
        <div class="cleaning-types">${cleaningTypeBtns('eos', i, t.cleaning)}</div>
        <div class="phc-options" id="eos-phc-${i}" style="display:${t.cleaning === 'PHC' ? 'grid' : 'none'}">
          <button class="phc-btn ${t.internal ? 'active' : ''}" id="eos-internal-${i}" onclick="this.classList.toggle('active')">Internal</button>
          <button class="phc-btn ${t.external ? 'active' : ''}" id="eos-external-${i}" onclick="this.classList.toggle('active')">External</button>
        </div>
      </div>
      <div class="grid2">
        <div class="field"><label>Start of cleaning</label><input type="time" id="eos-start-${i}" value="${t.start}" /></div>
        <div class="field"><label>End of cleaning</label><input type="time" id="eos-end-${i}" value="${t.end}" /></div>
      </div>
      <div class="field"><label>Staff leaving early (if any)</label><input type="text" id="eos-early-${i}" value="${t.earlyLeave}" placeholder="Names and reason..." /></div>
    </div>`
  }

  function saveAllSOS() {
    sosTrains.forEach((_, i) => saveSOSTrain(i))
  }

  function saveAllEOS() {
    eosTrains.forEach((_, i) => saveEOSTrain(i))
  }
  function generateSOS() {
    const date = document.getElementById('sos-date').value
    const shift = document.getElementById('sos-shift').value
    const dm = document.getElementById('sos-dm').value
    const supervisor = document.getElementById('sos-supervisor').value
    const headcount = document.getElementById('sos-headcount').value
    const staff = getChecked('sos-staff')
    const late = document.getElementById('sos-late')?.value || ''

    const planner = getToggle('sos-planner') || '-'
    const ontime = getToggle('sos-ontime') || '-'
    const fire = getToggle('sos-fire') || '-'
    const tracker = getToggle('sos-tracker') || '-'
    const ppe = getToggle('sos-ppe') || '-'
    const storage = getToggle('sos-storage') || '-'

    let trainText = ''
    sosTrains.forEach((t, i) => {
      const cleaning = t.cleaning === 'PHC'
        ? `PHC${t.internal && t.external ? ' FULL' : t.internal ? ' INTERNAL' : t.external ? ' EXTERNAL' : ''}`
        : t.cleaning
      trainText += `\nClean requested:\n${t.type.toUpperCase()} ${t.id} ${cleaning}\nETA: ${t.eta}\nRequired back: ${t.required}\nDeparture: ${t.departure}\n`
    })

    const report = `Start of Shift Report:

Date: ${date.split('-').reverse().join('/')}
Shift: ${shift}
Depot Manager on shift:
${dm}

Picture of planner sent: ${planner}
All staff on time: ${ontime}${ontime === 'No' && late ? `\nWho was late: ${late}` : ''}

Supervisor on shift:
${supervisor}
Headcount of staff on shift: ${headcount}
Names of staff on shift:
${staff.map((s, i) => `${i + 1}. ${s}`).join('\n')}

All staff signed in on
Fire register/Reception: ${fire}
Churchill shift tracker: ${tracker}
All staff in full PPE & Inspected: ${ppe}
Storage unit & equipment received in good order: ${storage}
${trainText}`

    showOutput(report)
  }

  function generateEOS() {
    const date = document.getElementById('eos-date').value
    const shift = document.getElementById('eos-shift').value
    const hitachi = getToggle('eos-hitachi') || '-'
    const docs = getToggle('eos-docs') || '-'
    const endtime = document.getElementById('eos-endtime').value
    const notes = document.getElementById('eos-notes').value

    let trainText = ''
    eosTrains.forEach(t => {
      const cleaning = t.cleaning === 'PHC'
        ? `PHC${t.internal && t.external ? ' FULL' : t.internal ? ' INTERNAL' : t.external ? ' EXTERNAL' : ''}`
        : t.cleaning
      trainText += `\nTrain number: ${t.type.toUpperCase()} ${t.id}\nType of cleaning: ${cleaning}\nStart of cleaning: ${t.start}\nEnd of cleaning: ${t.end}${t.earlyLeave ? `\nStaff leaving early: ${t.earlyLeave}` : ''}\n`
    })

    const report = `End of Shift Report:

Date: ${date.split('-').reverse().join('/')}
Shift: ${shift}
${trainText}
Hitachi presentation check: ${hitachi}
Documents signed: ${docs}

Additional notes:
${notes || 'None'}

End of shift: ${endtime}`

    showOutput(report)
  }

  function showOutput(report) {
    document.getElementById('sos-form').style.display = 'none'
    document.getElementById('eos-form').style.display = 'none'
    document.getElementById('output').style.display = 'block'
    document.getElementById('output').innerHTML = `
      <div class="card">
        <div class="section-title">Generated Report</div>
        <div class="output-box" id="report-text">${report}</div>
        <button class="copy-btn" onclick="copyReport()">Copy to Clipboard</button>
        <button class="back-btn" onclick="goBack()">Back to Form</button>
      </div>
    `
    window._currentReport = report
  }

  function copyReport() {
    navigator.clipboard.writeText(window._currentReport).then(() => {
      const btn = document.querySelector('.copy-btn')
      btn.textContent = 'Copied!'
      btn.style.background = '#047857'
      setTimeout(() => { btn.textContent = 'Copy to Clipboard'; btn.style.background = '#059669' }, 2000)
    })
  }

  function goBack() {
    document.getElementById('output').style.display = 'none'
    document.getElementById('sos-form').style.display = currentMode === 'sos' ? 'block' : 'none'
    document.getElementById('eos-form').style.display = currentMode === 'eos' ? 'block' : 'none'
  }
</script>
</body>
</html>
